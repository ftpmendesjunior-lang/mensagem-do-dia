<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mensagem do Dia</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: linear-gradient(135deg, #f7e8f6, #e3f2fd);
}

/* modo escuro */
@media (prefers-color-scheme: dark) {
  body {
    background: linear-gradient(135deg, #1e1e2f, #2c2c3a);
    color: #eee;
  }
}

.container {
  background: rgba(255,255,255,0.9);
  padding: 25px;
  border-radius: 20px;
  width: 90%;
  max-width: 400px;
  text-align: center;
  box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

@media (prefers-color-scheme: dark) {
  .container {
    background: rgba(0,0,0,0.5);
  }
}

h1 {
  color: #b48ac2;
}

#mensagem {
  margin: 20px 0;
  font-size: 18px;
  line-height: 1.5;
}

/* botões */
button {
  margin-top: 10px;
  background: #b48ac2;
  color: white;
  border: none;
  padding: 12px 18px;
  border-radius: 12px;
  font-size: 15px;
  cursor: pointer;
}

/* mensagem de denúncia */
.denuncia {
  margin-top: 20px;
  font-size: 13px;
  opacity: 0.7;
  line-height: 1.4;
}
</style>
</head>

<body>

<div class="container">
  <h1>Mensagem do Dia</h1>
  <p id="data"></p>
  <p id="mensagem"></p>

  <button onclick="compartilhar()">📤 Compartilhar</button>
  <button id="btnSom" onclick="toggleMusica()">🎧 Ativar música</button>

  <!-- MENSAGEM DE DENÚNCIA -->
  <p class="denuncia">
  Nenhuma mulher merece viver com medo.  
  Se você presenciar ou sofrer violência, denuncie: <strong>180</strong>.  
  Você não está sozinha.
  </p>
</div>

<!-- ÁUDIO -->
<audio id="musica" loop>
  <source src="musica.MP3" type="audio/mpeg">
</audio>

<script>

// MENSAGENS (coloque aqui suas 365 depois)
const mensagens = [
"Você merece respeito — sempre, sem exceção.",
"Ser gentil consigo mesma também é um ato de coragem.",
"Respeitar uma mulher é o mínimo. Valorizar é o essencial.",
"Você merece viver com paz, respeito e dignidade — todos os dias."
];

// DATA
const hoje = new Date();
const inicio = new Date(hoje.getFullYear(), 0, 0);
const diff = hoje - inicio;
const dia = Math.floor(diff / (1000 * 60 * 60 * 24));

const mensagem = mensagens[(dia - 1) % mensagens.length];

document.getElementById("mensagem").innerText = mensagem;
document.getElementById("data").innerText =
hoje.toLocaleDateString('pt-BR');

// COMPARTILHAR
function compartilhar() {
  if (navigator.share) {
    navigator.share({
      title: "Mensagem do Dia",
      text: mensagem
    });
  } else {
    navigator.clipboard.writeText(mensagem);
    alert("Mensagem copiada!");
  }
}

// MÚSICA
let tocando = false;
const audio = document.getElementById("musica");
audio.volume = 0.3;

function toggleMusica() {
  const botao = document.getElementById("btnSom");

  if (!tocando) {
    audio.play();
    botao.innerText = "🔊 Música ligada";
    tocando = true;
  } else {
    audio.pause();
    botao.innerText = "🎧 Ativar música";
    tocando = false;
  }
}
</script>

</body>
</html>

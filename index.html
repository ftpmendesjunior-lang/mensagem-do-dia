<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mensagem do Dia</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  transition: 0.3s;
}

/* MODO CLARO */
body {
  background: linear-gradient(135deg, #f7e8f6, #e3f2fd);
  color: #333;
}

/* MODO ESCURO AUTOMÁTICO */
@media (prefers-color-scheme: dark) {
  body {
    background: linear-gradient(135deg, #1e1e2f, #2c2c3a);
    color: #eee;
  }
}

.container {
  background: rgba(255,255,255,0.85);
  padding: 25px;
  border-radius: 20px;
  width: 90%;
  max-width: 400px;
  text-align: center;
  backdrop-filter: blur(10px);
}

@media (prefers-color-scheme: dark) {
  .container {
    background: rgba(0,0,0,0.5);
  }
}

h1 {
  color: #b48ac2;
  font-size: 22px;
}

#data {
  font-size: 14px;
  opacity: 0.7;
}

#mensagem {
  font-size: 18px;
  margin: 20px 0;
  line-height: 1.5;
}

/* BOTÃO */
button {
  background: #b48ac2;
  border: none;
  padding: 10px 15px;
  border-radius: 10px;
  color: white;
  font-size: 14px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
  <h1>Mensagem do Dia</h1>
  <p id="data"></p>
  <p id="mensagem"></p>

  <button onclick="compartilhar()">Compartilhar</button>
</div>

<!-- MÚSICA -->
<audio autoplay loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<script>

// 👉 COLEI RESUMIDO PRA NÃO FICAR GIGANTE (VOCÊ JÁ TEM TODAS)
const mensagens = [
"Você merece respeito — sempre, sem exceção.",
"Ser gentil consigo mesma também é um ato de coragem.",
"Respeitar uma mulher é o mínimo. Valorizar é o essencial.",
"Nem toda dor é visível, mas toda dor merece cuidado.",
"Você não precisa carregar o mundo sozinha.",
"Ouvir é um gesto poderoso. Pratique isso hoje.",
"Há força em quem recomeça, mesmo em silêncio.",
"O respeito começa nas pequenas atitudes.",
"Você é suficiente — mesmo nos dias difíceis.",
"Empatia também transforma o mundo.",
"Você merece viver com paz, respeito e dignidade — todos os dias."
];

// DATA
const hoje = new Date();
const inicio = new Date(hoje.getFullYear(), 0, 0);
const diff = hoje - inicio;
const dia = Math.floor(diff / (1000 * 60 * 60 * 24));

// MOSTRAR MENSAGEM
const mensagem = mensagens[(dia - 1) % mensagens.length];

document.getElementById("mensagem").innerText = mensagem;
document.getElementById("data").innerText =
hoje.toLocaleDateString('pt-BR');

// COMPARTILHAR
function compartilhar() {
  const texto = mensagem + " 💜";

  if (navigator.share) {
    navigator.share({
      title: "Mensagem do Dia",
      text: texto
    });
  } else {
    navigator.clipboard.writeText(texto);
    alert("Mensagem copiada!");
  }
}

</script>

</body>
</html>

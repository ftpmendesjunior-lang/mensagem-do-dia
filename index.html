<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mensagem do Dia</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: linear-gradient(135deg, #f7e8f6, #e3f2fd);
}

.container {
  background: rgba(255,255,255,0.9);
  padding: 25px;
  border-radius: 20px;
  width: 90%;
  max-width: 400px;
  text-align: center;
}

h1 { color: #b48ac2; }

</style>
</head>

<body>

<div class="container">
  <h1>Mensagem do Dia</h1>
  <p id="data"></p>
  <p id="mensagem"></p>
  <p id="dica">Toque na tela para ativar a música 🎧</p>
</div>

<audio id="musica" loop>
  <source src="musica.MP3" type="audio/mpeg">
</audio>

<script>
const mensagens = [
"Você merece respeito — sempre, sem exceção.",
"Ser gentil consigo mesma também é um ato de coragem.",
"Respeitar uma mulher é o mínimo. Valorizar é o essencial."
];

const hoje = new Date();
const inicio = new Date(hoje.getFullYear(), 0, 0);
const diff = hoje - inicio;
const dia = Math.floor(diff / (1000 * 60 * 60 * 24));

document.getElementById("mensagem").innerText =
mensagens[(dia - 1) % mensagens.length];

document.getElementById("data").innerText =
hoje.toLocaleDateString('pt-BR');

let musicaIniciada = false;

function iniciarMusica() {
  if (!musicaIniciada) {
    const audio = document.getElementById("musica");
    audio.play();
    musicaIniciada = true;
    document.getElementById("dica").style.display = "none";
  }
}

document.addEventListener("click", iniciarMusica);
document.addEventListener("touchstart", iniciarMusica);
</script>

</body>
</html>
